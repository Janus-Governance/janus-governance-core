<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Janus Governance Core</title>
    <meta
      name="description"
      content="Janus Governance Core — Traceable governance for AI-assisted systems."
    />
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        line-height: 1.5;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 72px 20px 64px;
        text-align: center;
      }

      .logo {
        display: block;
        width: 160px;
        height: auto;
        margin: 0 auto 18px;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
      }

      .subtitle {
        font-size: 1.1rem;
        margin: 0;
        color: #cfcfcf;
      }

      .tagline {
        margin: 10px 0 0;
        color: #cfcfcf;
        font-size: 1.02rem;
      }

      a {
        color: #fff;
        text-decoration: none;
      }

      a:hover,
      a:focus {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .nav {
        margin-top: 26px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        max-width: 520px;
        margin-left: auto;
        margin-right: auto;
      }

      .nav a {
        display: block;
        padding: 12px 14px;
        border: 1px solid #222;
        border-radius: 10px;
        color: #cfcfcf;
      }

      .nav a:hover,
      .nav a:focus {
        color: #fff;
        border-color: #333;
        background: #111;
        text-decoration: none;
      }

      @media (max-width: 520px) {
        .nav {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <img class="logo" src="assets/logo/janus-logo.svg" width="160" alt="Janus logo" />
      <h1>Janus Governance Core</h1>
      <p class="subtitle">Traceable governance for AI-assisted systems</p>
      <p class="tagline">A governance kernel for auditable AI-assisted systems.</p>
      <nav class="nav" aria-label="Site navigation">
        <a href="/docs/">Documentation</a>
        <a href="/rfcs/">RFC Series</a>
        <a href="/runtime/">Runtime</a>
        <a href="/demos/">Demos</a>
        <a href="https://github.com/Janus-Governance/janus-governance-core">Repository</a>
      </nav>
    </main>
  </body>
</html>
