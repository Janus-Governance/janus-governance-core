<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Janus Governance Core</title>
    <meta
      name="description"
      content="Janus Governance Core — Traceable governance for AI-assisted systems."
    />
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        line-height: 1.5;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 72px 20px 64px;
        text-align: center;
      }

      .logo {
        display: block;
        width: 160px;
        height: auto;
        margin: 0 auto 18px;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
      }

      .subtitle {
        font-size: 1.1rem;
        margin: 0;
        color: #cfcfcf;
      }

      a {
        color: #fff;
        text-decoration: none;
      }

      a:hover,
      a:focus {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .link {
        display: inline-block;
        margin-top: 22px;
        color: #cfcfcf;
        font-size: 0.98rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <img class="logo" src="assets/logo/janus-logo.svg" width="160" alt="Janus logo" />
      <h1>Janus Governance Core</h1>
      <p class="subtitle">Traceable governance for AI-assisted systems</p>
      <a class="link" href="https://github.com/janus-governance/janus-governance-core"
        >https://github.com/janus-governance/janus-governance-core</a
      >
    </main>
  </body>
</html>
